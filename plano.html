<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Plano de la tienda · TOTAL TOOLS</title>
<style>
  :root{ --amarillo:#f7b500; --negro:#15171c; --bg:#0f1216; --panel:#1a1d23; --linea:#ffffff1c; --txt:#e9edf2; --mute:#9aa3ad;
    --safe-b:env(safe-area-inset-bottom,0px); }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{ font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; background:
    radial-gradient(120% 80% at 50% 0%, #1c2230 0%, var(--bg) 60%); color:var(--txt);
    display:flex; flex-direction:column; min-height:100%; }
  .signage{ font-weight:800; letter-spacing:.04em; text-transform:uppercase; }

  header{ position:sticky; top:0; z-index:20; background:linear-gradient(#14161af2,#14161ac8); backdrop-filter:blur(6px);
    border-bottom:1px solid var(--linea);
    padding:10px max(12px,env(safe-area-inset-left)) 10px max(12px,env(safe-area-inset-right)); display:flex; align-items:center; gap:10px; }
  .logo{ width:32px; height:32px; border-radius:9px; background:var(--amarillo); color:#111; display:grid; place-items:center; font-weight:900; font-size:18px; }
  .htitle b{ font-size:14px; } .htitle span{ display:block; font-size:10px; color:var(--mute); letter-spacing:.06em; }
  .seg{ margin-left:auto; display:flex; background:#0c0e12; border:1px solid var(--linea); border-radius:10px; overflow:hidden; }
  .seg button{ background:none; color:var(--mute); font-weight:700; font-size:12px; padding:7px 11px; border:none; cursor:pointer; }
  .seg button.on{ background:var(--amarillo); color:#111; }
  .enter{ text-decoration:none; background:#14161a; border:1px solid var(--linea); color:var(--amarillo); font-weight:800; font-size:12.5px; padding:8px 12px; border-radius:10px; }

  .stage{ flex:1; overflow:auto; -webkit-overflow-scrolling:touch; padding:14px; display:grid; place-items:center; }
  .stage svg{ width:100%; height:auto; max-width:820px; display:block; }
  .room{ cursor:pointer; }
  .room:active{ opacity:.85; }
  .pill-bg{ fill:#0c0e12; stroke:#ffffff26; }
  .pill-tx{ fill:#fff; font-weight:800; }
  .pill-sub{ fill:#f7b500; font-weight:700; }
  .entrada-tx{ fill:var(--mute); font-weight:800; letter-spacing:3px; }

  footer{ padding:10px 14px calc(12px + var(--safe-b)); color:var(--mute); font-size:12px; text-align:center; border-top:1px solid var(--linea); background:#14161a; }
  .empty{ color:var(--mute); text-align:center; padding:40px 16px; }
  .toast{ position:fixed; left:50%; bottom:calc(60px + var(--safe-b)); transform:translateX(-50%) translateY(16px);
    background:#0c0e12; border:1px solid var(--linea); color:#fff; padding:9px 15px; border-radius:11px; font-size:13px; opacity:0; pointer-events:none; transition:.25s; z-index:40; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<header>
  <div class="logo">T</div>
  <div class="htitle"><b class="signage">Plano de la tienda</b><span>Toca una sala para entrar</span></div>
  <div class="seg" id="seg"><button data-m="iso" class="on">Isométrica</button><button data-m="flat">2D</button></div>
  <a class="enter" href="index.html">🎮 Tienda</a>
</header>

<div class="stage" id="stage"><div class="empty">Cargando plano…</div></div>
<footer id="foot">Cada sala es un pasillo. Toca una para caminar hasta ahí.</footer>
<div class="toast" id="toast"></div>

<script src="db.js"></script>
<script>
(function(){
  "use strict";
  var mode="iso";
  var TW=128, TH=64, WALL=34;        // tile ancho/alto, altura de pared (iso)
  var FW=150, FH=104;                // celda 2D

  function racksSorted(){ return (TTDB.racks()||[]).slice().sort(function(a,b){ return (a.pasillo||0)-(b.pasillo||0); }); }
  function cols(n){ var c=(typeof TTDB.config==="function")?(TTDB.config().cols):0; if(c>=1&&c<=4) return c; return Math.min(3,Math.max(1,Math.ceil(Math.sqrt(n||1)))); }
  function pCount(id){ return (TTDB.productos()||[]).filter(function(p){ return p.rackId===id; }).length; }
  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  // aclarar/oscurecer un hex
  function shade(hex,pct){ hex=(hex||"#f7b500").replace("#",""); if(hex.length===3) hex=hex.replace(/(.)/g,"$1$1");
    var r=parseInt(hex.substr(0,2),16),g=parseInt(hex.substr(2,2),16),b=parseInt(hex.substr(4,2),16);
    var f=pct<0?0:255, t=Math.abs(pct);
    r=Math.round((f-r)*t+r); g=Math.round((f-g)*t+g); b=Math.round((f-b)*t+b);
    return "#"+[r,g,b].map(function(v){ return ("0"+Math.max(0,Math.min(255,v)).toString(16)).slice(-2); }).join(""); }

  function pts(a){ return a.map(function(p){ return p[0].toFixed(1)+","+p[1].toFixed(1); }).join(" "); }

  function build(){
    var rk=racksSorted();
    var stage=document.getElementById("stage");
    if(!rk.length){ stage.innerHTML='<div class="empty">No hay pasillos todavía.<br>Créalos en 🧱 Diseño y vuelve.</div>'; return; }
    var C=cols(rk.length), rows=Math.ceil(rk.length/C);
    var cells=rk.map(function(r,i){ return { r:r, c:i%C, row:Math.floor(i/C), i:i }; });

    var body="", minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
    function ext(x,y){ if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y; }

    // orden pintor: de atrás (menor row+col) hacia adelante
    var order=cells.slice().sort(function(a,b){ return (a.row+a.c)-(b.row+b.c) || a.row-b.row; });

    order.forEach(function(cell){
      var col=cell.c, row=cell.row, r=cell.r, col0=r.color||"#f7b500";
      var floorC=shade(col0,0.18), wallR=shade(col0,-0.28), wallL=shade(col0,-0.12), edge=shade(col0,-0.45);
      var name=(r.nombre||"—"), num="P"+String(cell.i).padStart(2,"0"), n=pCount(r.id);
      var group="";

      if(mode==="iso"){
        var X=(col-row)*(TW/2), Y=(col+row)*(TH/2);
        var top=[X,Y], right=[X+TW/2,Y+TH/2], bot=[X,Y+TH], left=[X-TW/2,Y+TH/2];
        // paredes traseras (suben -WALL)
        var wallRight=[[top[0],top[1]-WALL],[right[0],right[1]-WALL],[right[0],right[1]],[top[0],top[1]]];
        var wallLeft =[[left[0],left[1]-WALL],[top[0],top[1]-WALL],[top[0],top[1]],[left[0],left[1]]];
        group+='<polygon points="'+pts(wallLeft)+'" fill="'+wallL+'" stroke="'+edge+'" stroke-width="1"/>';
        group+='<polygon points="'+pts(wallRight)+'" fill="'+wallR+'" stroke="'+edge+'" stroke-width="1"/>';
        group+='<polygon points="'+pts([top,right,bot,left])+'" fill="'+floorC+'" stroke="'+edge+'" stroke-width="1.5"/>';
        // etiqueta
        var lx=X, ly=Y-WALL-6, lw=Math.max(58, name.length*7.3+16);
        group+=pill(lx,ly,lw,name,num+" · "+n+(n===1?" prod":" prods"));
        ext(X-TW/2,Y-WALL-30); ext(X+TW/2,Y+TH+6);
      } else {
        var fx=col*(FW+14), fy=row*(FH+14);
        group+='<rect x="'+fx+'" y="'+fy+'" width="'+FW+'" height="'+FH+'" rx="12" fill="'+floorC+'" stroke="'+edge+'" stroke-width="2"/>';
        group+='<rect x="'+fx+'" y="'+fy+'" width="'+FW+'" height="26" rx="12" fill="'+wallR+'"/>';
        group+='<text x="'+(fx+FW/2)+'" y="'+(fy+17)+'" text-anchor="middle" font-size="12" class="pill-tx">'+esc(num)+'</text>';
        group+='<text x="'+(fx+FW/2)+'" y="'+(fy+FH/2+8)+'" text-anchor="middle" font-size="14" fill="#1a1a1a" font-weight="800">'+esc(name.length>16?name.slice(0,15)+"…":name)+'</text>';
        group+='<text x="'+(fx+FW/2)+'" y="'+(fy+FH-12)+'" text-anchor="middle" font-size="11" fill="#00000099" font-weight="700">'+n+(n===1?" producto":" productos")+'</text>';
        ext(fx,fy); ext(fx+FW,fy+FH);
      }
      body+='<a href="index.html#go='+esc(r.id)+'"><g class="room" data-go="'+esc(r.id)+'">'+group+'</g></a>';
    });

    // ENTRADA (frente)
    if(mode==="iso"){ var ex=(( (C-1) - (rows-1) )*(TW/2))/1; var ey=((C-1)+(rows-1))*(TH/2)+TH+22;
      body+='<text x="'+(( ( -(rows-1) )*(TW/2)))+'" y="'+ey+'" text-anchor="middle" font-size="13" class="entrada-tx">ENTRADA</text>';
      ext(0,ey+6);
    }

    var pad=26, w=(maxX-minX)+pad*2, h=(maxY-minY)+pad*2;
    stage.innerHTML='<svg viewBox="'+(minX-pad)+' '+(minY-pad)+' '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg">'+body+'</svg>';

    // navegación por toque (respaldo al <a>)
    stage.querySelectorAll(".room").forEach(function(g){
      g.addEventListener("click", function(ev){ ev.preventDefault(); var id=g.getAttribute("data-go");
        toast("Entrando…"); setTimeout(function(){ location.href="index.html#go="+id; }, 150); });
    });
    document.getElementById("foot").textContent = rk.length+" pasillos · "+(TTDB.productos()||[]).length+" productos en total";
  }

  function pill(cx,cy,w,name,sub){
    var h=sub?30:20, x=cx-w/2, y=cy-h;
    var s='<rect class="pill-bg" x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+w.toFixed(1)+'" height="'+h+'" rx="8"/>';
    s+='<text class="pill-tx" x="'+cx.toFixed(1)+'" y="'+(y+ (sub?13:14)).toFixed(1)+'" text-anchor="middle" font-size="11.5">'+esc(name.length>20?name.slice(0,19)+"…":name)+'</text>';
    if(sub) s+='<text class="pill-sub" x="'+cx.toFixed(1)+'" y="'+(y+25).toFixed(1)+'" text-anchor="middle" font-size="9.5">'+esc(sub)+'</text>';
    return s;
  }

  function toast(t){ var el=document.getElementById("toast"); el.textContent=t; el.classList.add("show");
    clearTimeout(toast._t); toast._t=setTimeout(function(){ el.classList.remove("show"); },1400); }

  document.getElementById("seg").addEventListener("click", function(e){ var b=e.target.closest("button"); if(!b) return;
    mode=b.dataset.m; document.querySelectorAll("#seg button").forEach(function(x){ x.classList.toggle("on", x===b); }); build(); });

  if(window.TTDB) build();
  else document.getElementById("stage").innerHTML='<div class="empty">No se encontró db.js. Súbelo junto a este archivo.</div>';
})();
</script>
</body>
</html>
