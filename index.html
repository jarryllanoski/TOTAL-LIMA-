<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#1a1d23" />
<title>Total Tools · Tienda</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet" />
<script src="db.js"></script>
<style>
:root{
  --concreto:#1a1d23; --concreto-2:#23272f;
  --amarillo:#f7b500; --amarillo-2:#ffd454; --negro:#14161a;
  --madera:#8a5a32; --madera-2:#6f4827;
  --pegboard:#c7a877; --pegboard-2:#b8975f;
  --ok:#34d399; --texto:#f4efe6; --texto-mute:#b6b0a4;
  --sombra:0 10px 30px rgba(0,0,0,.45);
  --safe-b:env(safe-area-inset-bottom,0px);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; height:100%; overflow:hidden; background:var(--concreto); color:var(--texto); }
button{ font-family:inherit; cursor:pointer; border:none; }
.mono{ font-family:ui-monospace,"SF Mono","Roboto Mono",Menlo,monospace; }
.signage{ font-family:"Anton",system-ui,sans-serif; letter-spacing:.5px; text-transform:uppercase; }

/* Mover el menú de módulos (db.js) ARRIBA */
#ttnav-btn{ display:none !important; }
#ttnav-menu{ top:62px !important; bottom:auto !important; left:12px !important; transform-origin:top left !important; }

.topbar{ position:fixed; inset:0 0 auto 0; z-index:40; height:56px; display:flex; align-items:center; gap:7px;
  padding:0 12px; background:linear-gradient(#1a1d23ee,#1a1d23cc); backdrop-filter:blur(6px); border-bottom:1px solid #0008; }
.brand{ display:flex; align-items:center; gap:7px; flex:0 0 auto; }
.brand .logo{ width:32px; height:32px; border-radius:9px; display:grid; place-items:center; background:var(--amarillo); color:var(--negro); font-size:19px; box-shadow:0 2px 0 #0006; text-decoration:none; cursor:pointer; }
.brand .name b{ font-size:12px; display:block; line-height:1; } .brand .name span{ font-size:8px; color:var(--texto-mute); letter-spacing:1.5px; }
.hdr-btn{ flex:0 0 auto; width:38px; height:38px; border-radius:11px; background:#14161a; border:1px solid #ffffff1c; color:var(--amarillo); font-size:19px; }
.top-search{ flex:1; min-width:0; display:flex; align-items:center; gap:6px; background:#0d0f13; border:1px solid #2c2f37; border-radius:999px; padding:0 6px 0 12px; }
.top-search input{ flex:1; min-width:0; background:none; border:none; outline:none; color:var(--texto); font-size:14px; padding:10px 0; }
.top-search input::placeholder{ color:#7d7f86; }
.top-search button{ width:34px; height:34px; flex:0 0 auto; border-radius:50%; background:var(--amarillo); color:var(--negro); font-size:15px; }
.map-btn{ flex:0 0 auto; width:38px; height:38px; border-radius:11px; background:#14161a; border:1px solid #ffffff1c; color:var(--amarillo); font-size:18px; }
@media (max-width:600px){ .brand .name{ display:none; } }

.section-banner{ position:fixed; left:0; right:0; top:56px; z-index:30; height:38px; display:flex; align-items:center; gap:10px;
  padding:0 14px; color:var(--negro); background:repeating-linear-gradient(45deg,#f7b500 0 18px,#14161a 18px 36px); box-shadow:0 4px 14px #0007; }
.section-banner .chip{ background:#14161a; color:var(--amarillo); padding:4px 12px; border-radius:6px; font-size:13px; }
.section-banner .chip b{ font-size:14px; }
.section-banner .hint{ margin-left:auto; font-size:11px; color:#14161a; background:#ffffffcc; padding:3px 9px; border-radius:999px; font-weight:700; }

.stage{ position:fixed; inset:94px 0 0 0; overflow:hidden; }
.amb{ position:absolute; inset:0; z-index:15; pointer-events:none;
  background:
    radial-gradient(120% 55% at 50% -12%, #ffe6a52e 0%, #0000 46%),
    radial-gradient(150% 100% at 50% 48%, #0000 58%, #00000066 100%); }
.world{ position:absolute; inset:0; overflow:hidden; cursor:pointer; touch-action:none; z-index:1;
  background:repeating-linear-gradient(0deg,#f7b5001a 0 3px,#0000 3px 30px), repeating-linear-gradient(90deg,#f7b5001a 0 3px,#0000 3px 30px), linear-gradient(#1c2026,#15171c); }
.store-grid{ position:absolute; top:0; left:0; transform-origin:0 0; will-change:transform; display:flex; flex-direction:column; gap:120px; padding:18px 90px 0; }
.corridor{ display:flex; align-items:flex-start; gap:46px; }

.bay{ position:relative; flex:0 0 auto; background:radial-gradient(circle at center,#0000 2px,#00000022 3px) 0 0/22px 22px, linear-gradient(180deg,var(--pegboard),var(--pegboard-2));
  background-blend-mode:multiply,normal; border:3px solid #00000044; border-radius:16px; padding:10px 12px 14px; box-shadow:0 16px 34px #0009; }
.bay-sign{ display:inline-block; background:#14161a; color:var(--amarillo); border:1px solid #ffffff22; font-size:13px; padding:4px 11px; border-radius:8px; margin:0 0 8px 2px; white-space:nowrap; box-shadow:0 3px 10px #0006; }
.bay-rows{ display:flex; flex-direction:column; gap:4px; }
.bay-row{ display:flex; gap:12px; align-items:flex-end; padding:0 2px; }
.ledge{ height:13px; width:100%; background:linear-gradient(180deg,var(--madera),var(--madera-2)); border-radius:3px; box-shadow:0 7px 14px #0007, inset 0 2px 0 #ffffff22; margin:0 0 10px; }
.bay-empty{ color:#00000055; font-size:12px; padding:24px 14px; }

.product{ width:106px; position:relative; display:flex; flex-direction:column; gap:5px; cursor:pointer; transform-origin:bottom center; transition:transform .18s ease; background:none; }
.product:active{ transform:translateY(-3px) scale(1.04); }
.product .photo{ height:76px; border-radius:11px; display:grid; place-items:center; font-size:36px; overflow:hidden;
  background:radial-gradient(circle at 50% 35%,#ffffff14,#0000), linear-gradient(160deg,#2f343d,#202329); border:1px solid #ffffff10; box-shadow:var(--sombra); position:relative; }
.product .photo img{ width:100%; height:100%; object-fit:cover; }
.product .photo .vid{ position:absolute; top:5px; right:5px; font-size:10px; background:#000a; color:#fff; padding:2px 6px; border-radius:6px; }
.product .pname{ font-size:11px; line-height:1.15; min-height:26px; max-height:40px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; color:#1a1a1a; font-weight:700; }
.product .photo .ph-ic{ filter:drop-shadow(0 4px 6px #0006); }
.product .ptag{ align-self:flex-start; background:var(--amarillo); color:var(--negro); font-size:12px; padding:2px 8px; border-radius:6px; font-weight:700; box-shadow:0 2px 0 #0005; }
.product.spot .photo{ box-shadow:0 0 0 3px var(--amarillo), 0 0 26px #f7b50099, var(--sombra); animation:spot 1.4s ease 2; }
@keyframes spot{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-8px); } }

.road{ position:absolute; left:0; right:0; bottom:0; height:120px; z-index:10; pointer-events:none;
  background:linear-gradient(#15171c00, #0d0f13 34%); }
.road::before{ content:""; position:absolute; left:0; right:0; top:54%; height:5px; background:repeating-linear-gradient(90deg,#f7b500 0 34px,#0000 34px 64px); opacity:.8; }

.actors{ position:absolute; left:0; top:0; transform:translate(-50%,-100%); z-index:20; display:flex; align-items:flex-end; gap:0; pointer-events:none; }
.player,.advisor{ position:relative; display:flex; align-items:flex-end; pointer-events:none; }
.advisor{ margin-left:18px; }
#playerCart, .player .tag, .advisor .tag{ pointer-events:auto; cursor:pointer; }
.cart-btn{ position:relative; background:none; margin-left:-10px; cursor:pointer; align-self:flex-end; }
.cart-btn .badge{ position:absolute; top:-6px; right:-6px; min-width:23px; height:23px; padding:0 5px; border-radius:999px; background:#e0392b; color:#fff; font-size:12px; font-weight:800; display:grid; place-items:center; border:2px solid var(--concreto); transform:scale(0); transition:transform .2s; z-index:4; }
.cart-btn .badge.show{ transform:scale(1); }
.cart-btn.bump{ animation:bump .35s ease; }
@keyframes bump{ 0%,100%{ transform:scale(1); } 40%{ transform:scale(1.16); } }
/* Carrito GRANDE sostenido por el cliente */
.cartfig{ position:relative; width:62px; height:54px; filter:drop-shadow(0 6px 5px #0008); }
.cartfig .basket{ position:absolute; left:14px; top:8px; width:42px; height:25px; background:#a9dbe8; border:3px solid #4f9aac; border-radius:2px 4px 9px 9px; transform:skewX(-9deg);
  background-image:repeating-linear-gradient(90deg,#4f9aac66 0 1px,#0000 1px 8px),repeating-linear-gradient(0deg,#4f9aac66 0 1px,#0000 1px 7px); }
.cartfig .handle{ position:absolute; left:0; top:2px; width:15px; height:20px; border-left:3px solid #4f9aac; border-top:3px solid #4f9aac; border-radius:4px 0 0 0; transform:rotate(-9deg); }
.cartfig .wheel{ position:absolute; bottom:0; width:12px; height:12px; border-radius:50%; background:#2a2a2a; border:2.5px solid #9aa; }
.cartfig .wheel.l{ left:18px; } .cartfig .wheel.r{ right:7px; }
.actors.walking .cartfig .wheel{ animation:spin .3s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg) } }
.player .figwrap{ cursor:pointer; }
.figwrap{ animation:bobup 2s ease-in-out infinite; }
.actors .shadow{ position:absolute; bottom:-2px; left:50%; transform:translateX(-50%); width:34px; height:7px; border-radius:50%; background:#000; opacity:.3; filter:blur(3px); }
.advisor .tag{ position:absolute; bottom:-6px; left:50%; transform:translateX(-50%); background:var(--amarillo); color:var(--negro); font-size:9px; font-weight:800; padding:1px 7px; border-radius:99px; white-space:nowrap; box-shadow:0 2px 0 #0005; }
.player .tag{ position:absolute; bottom:-6px; left:50%; transform:translateX(-50%); background:#14161a; color:var(--amarillo); border:1px solid var(--amarillo); font-size:9px; font-weight:800; padding:1px 7px; border-radius:99px; white-space:nowrap; box-shadow:0 2px 0 #0005; }
.advisor .bubble{ position:absolute; bottom:70px; left:50%; transform:translateX(-50%); background:#14161a; color:#fff; border:1px solid #ffffff22; font-size:12px; font-weight:700; padding:6px 11px; border-radius:12px; white-space:nowrap; box-shadow:var(--sombra); }
.advisor .bubble::after{ content:""; position:absolute; bottom:-6px; left:50%; transform:translateX(-50%); border:6px solid transparent; border-top-color:#14161a; border-bottom:0; }
.advisor .bubble{ transition:opacity .2s; }
.advisor .bubble.big{ white-space:normal; width:188px; text-align:center; line-height:1.32; bottom:74px; }
.advisor .bubble.pop{ animation:bpop .42s ease; }
@keyframes bpop{ 0%{ transform:translateX(-50%) translateY(10px) scale(.82); opacity:0; } 100%{ transform:translateX(-50%) translateY(0) scale(1); opacity:1; } }
.point-pin{ position:absolute; left:50%; top:0; z-index:30; font-size:30px; transform:translate(-50%,-115%); pointer-events:none; filter:drop-shadow(0 4px 4px #0007); animation:pinb .7s ease-in-out infinite; }
@keyframes pinb{ 0%,100%{ transform:translate(-50%,-115%); } 50%{ transform:translate(-50%,-145%); } }
@keyframes bobup{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-2px) } }

.fig{ position:relative; width:36px; height:66px; flex:0 0 auto; }
.player .fig{ transition:transform .12s ease; }
.actors.face-l .player .fig{ transform:scaleX(-1); }
.fig .head{ position:absolute; top:2px; left:50%; transform:translateX(-50%); width:19px; height:19px; border-radius:50%; background:var(--skin,#e8b98c); z-index:2; box-shadow:inset -2px -1px 0 #0000001a; }
.fig .hat{ position:absolute; top:-3px; left:50%; transform:translateX(-50%); width:25px; height:10px; border-radius:13px 13px 3px 3px; background:var(--hatc,#f7b500); z-index:3; display:var(--hatd,none); box-shadow:inset 0 -2px 0 #00000022; }
.fig .body{ position:absolute; top:18px; left:50%; transform:translateX(-50%); width:27px; height:28px; border-radius:9px 9px 6px 6px; background:var(--shirt,#3b82f6); z-index:1; box-shadow:inset 0 -6px 0 #00000012; }
.fig .body.vest{ box-shadow:inset 0 0 0 2px #1a1d2366, inset 0 7px 0 -4px #ffffffcc, inset 0 -8px 0 -4px #ffffffcc; }
.fig .arm{ position:absolute; top:20px; width:7px; height:23px; border-radius:5px; background:var(--shirt,#3b82f6); z-index:0; transform-origin:top center; }
.fig .arm.l{ left:1px; } .fig .arm.r{ right:1px; }
.fig .leg{ position:absolute; bottom:0; width:9px; height:20px; border-radius:5px 5px 4px 4px; background:var(--pants,#2b3a55); transform-origin:top center; z-index:1; }
.fig .leg.l{ left:8px; } .fig .leg.r{ right:8px; }
.actors.walking .fig .leg.l{ animation:legA .5s linear infinite; } .actors.walking .fig .leg.r{ animation:legB .5s linear infinite; }
.actors.walking .fig .arm.l{ animation:legB .5s linear infinite; } .actors.walking .fig .arm.r{ animation:legA .5s linear infinite; }
.advisor.point .fig .arm.r{ animation:none !important; transform:rotate(-152deg) !important; }
.advisor.point .fig .arm.r::after{ content:""; position:absolute; bottom:-3px; left:50%; transform:translateX(-50%); width:9px; height:9px; border-radius:50%; background:var(--skin,#e8b98c); box-shadow:inset -1px -1px 0 #0000001a; }
/* ---- Vida del asesor ---- */
.advisor .fig{ animation:idlebob 2.8s ease-in-out infinite; }
.actors.walking .advisor .fig{ animation:none; }
@keyframes idlebob{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-1.6px); } }
.advisor.talk .fig{ animation:talkbob .34s ease-in-out infinite; }
@keyframes talkbob{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-2.6px); } }
.advisor.talk .fig .head{ animation:nod .3s ease-in-out infinite; }
@keyframes nod{ 0%,100%{ transform:translateX(-50%) translateY(0); } 50%{ transform:translateX(-50%) translateY(1.6px); } }
.advisor.cheer .fig .arm.l{ animation:none !important; transform:rotate(148deg) !important; }
.advisor.cheer .fig .arm.r{ animation:none !important; transform:rotate(-148deg) !important; }
.advisor.cheer .fig{ animation:cheerhop .4s ease 2 !important; }
@keyframes cheerhop{ 0%,100%{ transform:translateY(0); } 40%{ transform:translateY(-8px); } }
@keyframes legA{ 0%,100%{ transform:rotate(15deg) } 50%{ transform:rotate(-15deg) } }
@keyframes legB{ 0%,100%{ transform:rotate(-15deg) } 50%{ transform:rotate(15deg) } }

/* Mini-pad lateral (no estorba abajo) */
.dpad{ position:fixed; right:10px; top:54%; transform:translateY(-50%); z-index:45; display:grid; grid-template-columns:repeat(3,38px); grid-template-rows:repeat(3,38px); gap:5px; }
.dpad .sp{ visibility:hidden; }
.dpad .dp{ width:38px; height:38px; border-radius:50%; background:#14161abb; border:1px solid #ffffff26; color:var(--amarillo); font-size:15px; display:none; place-items:center; box-shadow:var(--sombra); backdrop-filter:blur(3px); }
.dpad .dp.on{ display:grid; } .dpad .dp:active{ background:#000; }

.scrim{ position:fixed; inset:0; z-index:60; background:#000c; opacity:0; pointer-events:none; transition:opacity .25s; }
.scrim.open{ opacity:1; pointer-events:auto; }
.sheet{ position:fixed; left:0; right:0; bottom:0; z-index:61; background:var(--concreto-2); border-radius:22px 22px 0 0; padding:8px 18px calc(22px + var(--safe-b)); transform:translateY(110%); transition:transform .32s cubic-bezier(.2,.8,.2,1); box-shadow:0 -14px 40px #000a; max-height:80vh; overflow:auto; }
.sheet.open{ transform:translateY(0); }
.sheet .grab{ width:42px; height:5px; border-radius:99px; background:#ffffff33; margin:6px auto 14px; }
.sheet-top{ display:flex; gap:14px; }
.sheet .ph{ width:96px; height:96px; flex:0 0 auto; border-radius:16px; display:grid; place-items:center; font-size:54px; overflow:hidden; background:linear-gradient(160deg,#343a44,#23272f); border:1px solid #ffffff12; }
.sheet .ph img{ width:100%; height:100%; object-fit:cover; }
.sheet .meta{ flex:1; min-width:0; }
.sheet .brandtag{ font-size:11px; color:var(--amarillo); letter-spacing:1.5px; }
.sheet h2{ margin:2px 0 6px; font-size:19px; line-height:1.15; }
.sheet .price{ font-size:26px; color:var(--amarillo); }
.sheet .desc{ color:var(--texto-mute); font-size:14px; line-height:1.5; margin:14px 0; }
.sheet .adv-line{ display:flex; gap:9px; align-items:flex-start; background:#f7b50014; border:1px solid #f7b50033; border-radius:12px; padding:9px 11px; margin:14px 0 4px; font-size:13px; color:var(--texto); line-height:1.42; }
.sheet .adv-line .who{ color:var(--amarillo); font-weight:800; }
.sheet .specs{ margin:12px 0 2px; }
.sheet .specs .sp-h{ font-size:11px; letter-spacing:.1em; color:var(--texto-mute); text-transform:uppercase; margin-bottom:6px; }
.sheet .specs .sp{ display:flex; justify-content:space-between; gap:12px; padding:8px 0; border-top:1px solid #ffffff14; font-size:13.5px; }
.sheet .specs .sp:first-of-type{ border-top:0; }
.sheet .specs .sp .k{ color:var(--texto-mute); } .sheet .specs .sp .v{ font-weight:700; text-align:right; }
.sheet .actions{ display:flex; gap:10px; }
.btn-vid{ flex:0 0 auto; background:#0d0f13; color:var(--texto); border:1px solid #2c2f37; border-radius:12px; padding:14px 16px; font-size:14px; }
.btn-add{ flex:1; background:var(--amarillo); color:var(--negro); border-radius:12px; padding:14px; font-size:16px; font-weight:800; box-shadow:0 4px 0 #0005; }
.btn-add:active{ transform:translateY(2px); box-shadow:0 2px 0 #0005; }

.map-modal{ position:fixed; left:50%; top:50%; transform:translate(-50%,-46%) scale(.96); z-index:62; width:min(440px,calc(100vw - 28px)); max-height:80vh; overflow:auto;
  background:var(--concreto-2); border:1px solid #ffffff1c; border-radius:20px; padding:16px; box-shadow:0 20px 50px #000c; opacity:0; pointer-events:none; transition:.22s; }
.map-modal.open{ transform:translate(-50%,-50%) scale(1); opacity:1; pointer-events:auto; }
.mm-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.mm-head b{ font-size:16px; } .mm-head button{ background:none; color:var(--texto-mute); font-size:18px; }
.mm-foot{ text-align:center; color:var(--texto-mute); font-size:12px; margin:10px 0 2px; }
.mm-store{ background:#14161a; border:2px dashed #ffffff2a; border-radius:14px; padding:12px; margin-top:8px; }
.mm-grid{ display:grid; gap:8px; }
.mm-tile{ background:linear-gradient(180deg,var(--pegboard),var(--pegboard-2)); color:#14161a; border:none; border-radius:11px; padding:10px 8px; text-align:center; min-height:64px; display:flex; flex-direction:column; justify-content:center; gap:2px; box-shadow:0 4px 12px #0006; }
.mm-tile .pn{ font-size:10px; font-weight:800; background:#14161a; color:var(--amarillo); border-radius:5px; padding:1px 6px; display:inline-block; margin:0 auto; }
.mm-tile b{ font-size:12px; line-height:1.1; } .mm-tile small{ font-size:10px; opacity:.7; }
.mm-tile.here{ outline:3px solid var(--amarillo); box-shadow:0 0 0 3px #f7b50055,0 4px 12px #0006; }
.mm-tile.empty{ opacity:.5; }

.chat-catch{ position:fixed; inset:0; z-index:61; display:none; } .chat-catch.open{ display:block; }
.chat{ position:fixed; left:50%; bottom:14px; transform:translate(-50%,18px) scale(.98); z-index:62; width:min(380px,calc(100vw - 20px)); max-height:54vh;
  display:flex; flex-direction:column; background:var(--concreto-2); border:1px solid #ffffff1c; border-radius:18px; box-shadow:0 16px 44px #000c; opacity:0; pointer-events:none; transition:.2s; }
.chat.open{ transform:translate(-50%,0) scale(1); opacity:1; pointer-events:auto; }
.chat-head{ display:flex; align-items:center; gap:10px; padding:12px 14px; border-bottom:1px solid #ffffff10; }
.chat-head .av{ width:36px; height:36px; border-radius:10px; background:#14161a; display:grid; place-items:center; font-size:21px; }
.chat-head b{ font-size:15px; } .chat-head small{ display:block; color:var(--texto-mute); font-size:11px; }
.chat-head .x{ margin-left:auto; background:none; color:var(--texto-mute); font-size:18px; }
.chat-msgs{ flex:1; overflow:auto; padding:12px 14px; display:flex; flex-direction:column; gap:8px; min-height:60px; }
.msg{ max-width:86%; padding:9px 12px; border-radius:14px; font-size:14px; line-height:1.4; }
.msg.bot{ align-self:flex-start; background:#14161a; border:1px solid #ffffff10; border-bottom-left-radius:4px; }
.msg.me{ align-self:flex-end; background:var(--amarillo); color:var(--negro); font-weight:600; border-bottom-right-radius:4px; }
.res{ display:flex; align-items:center; gap:10px; background:#14161a; border:1px solid #ffffff12; border-radius:12px; padding:8px 10px; margin-top:6px; }
.res .e{ font-size:24px; width:38px; height:38px; display:grid; place-items:center; background:#23272f; border-radius:9px; flex:0 0 auto; overflow:hidden; }
.res .e img{ width:100%; height:100%; object-fit:cover; }
.res .i{ flex:1; min-width:0; } .res .i b{ font-size:13px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.res .i span{ font-size:13px; color:var(--amarillo); }
.res .go{ background:var(--amarillo); color:var(--negro); border-radius:9px; padding:7px 11px; font-size:13px; font-weight:800; flex:0 0 auto; }
.chat-chips{ display:flex; gap:8px; overflow-x:auto; padding:8px 14px; scrollbar-width:none; } .chat-chips::-webkit-scrollbar{ display:none; }
.chat-chip{ flex:0 0 auto; background:#14161a; border:1px solid #ffffff18; color:var(--texto); padding:8px 13px; border-radius:999px; font-size:13px; }
.chat-input{ display:flex; gap:8px; align-items:center; padding:10px 12px calc(12px + var(--safe-b)); border-top:1px solid #ffffff10; }
.chat-input input{ flex:1; background:#0d0f13; border:1px solid #2c2f37; border-radius:999px; padding:12px 15px; color:var(--texto); font-size:15px; outline:none; }
.chat-input button{ width:44px; height:44px; border-radius:50%; background:var(--amarillo); color:var(--negro); font-size:17px; flex:0 0 auto; }

.char-select{ position:fixed; inset:0; z-index:75; display:none; place-items:center; padding:24px; background:radial-gradient(120% 80% at 50% 0%, #2a2f38, #14161a); }
.cs-card{ width:100%; max-width:440px; text-align:center; }
.cs-logo{ display:inline-grid; place-items:center; width:60px; height:60px; border-radius:16px; background:var(--amarillo); color:var(--negro); font-size:30px; margin-bottom:12px; box-shadow:0 6px 0 #0006; }
.cs-card h2{ font-size:21px; margin:0 0 4px; } .cs-card p{ color:var(--texto-mute); margin:0 0 20px; font-size:14px; }
.cs-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.cs-grid .opt{ aspect-ratio:3/4; border-radius:16px; background:var(--concreto-2); border:1px solid #ffffff14; box-shadow:var(--sombra); display:grid; place-items:center; transition:transform .12s; }
.cs-grid .opt:active{ transform:scale(.92); border-color:var(--amarillo); }

.fly{ position:fixed; z-index:70; pointer-events:none; font-size:40px; transition:transform .55s cubic-bezier(.5,-.3,.6,1),opacity .55s; }
@media (prefers-reduced-motion: reduce){ .figwrap,.actors *{ animation:none !important; } }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand"><a class="logo signage" href="admin.html" aria-label="Abrir panel Admin">T</a><div class="name"><b class="signage">TOTAL TOOLS</b><span>FERRETERÍA</span></div></div>
  <button class="hdr-btn" id="modBtn" aria-label="Módulos (Admin / Caja)">⊞</button>
  <button class="map-btn" id="mapBtn" aria-label="Ver toda la tienda">🗺️</button>
  <button class="map-btn" id="voiceBtn" aria-label="Voz del asesor">🔊</button>
  <div class="top-search"><input id="topSearch" placeholder="Buscar herramientas…" autocomplete="off" /><button id="topSearchBtn" aria-label="Buscar">🔍</button></div>
</header>

<div class="section-banner">
  <div class="chip signage"><span id="pasilloLabel">PASILLO</span> · <b id="sectionName">TIENDA</b></div>
  <div class="hint">Toca para caminar</div>
</div>

<div class="stage">
  <div class="world" id="world"><div class="store-grid" id="grid"></div></div>
  <div class="road"></div>
  <div class="amb"></div>
  <div class="actors" id="actors">
    <div class="player" id="player">
      <div class="figwrap" id="playerFig"></div>
      <button class="cart-btn" id="playerCart" aria-label="Ver carrito"><div class="cartfig"><div class="basket"></div><div class="handle"></div><div class="wheel l"></div><div class="wheel r"></div></div><span class="badge" id="cartBadge">0</span></button>
      <div class="shadow"></div><span class="tag" id="charTag">👤 TÚ</span>
    </div>
    <div class="advisor" id="advisor" aria-label="Asesor TOTAL">
      <div class="bubble" id="advBubble">💬 Pregúntame</div>
      <div class="figwrap" id="advisorFig"></div><div class="shadow"></div><span class="tag" id="advTag">ASESOR</span>
    </div>
  </div>
</div>

<div class="dpad" id="dpad">
  <span class="sp"></span><button class="dp" id="dpUp" aria-label="Pasillo de arriba">▲</button><span class="sp"></span>
  <button class="dp" id="dpLeft" aria-label="Izquierda">◀</button><span class="sp"></span><button class="dp" id="dpRight" aria-label="Derecha">▶</button>
  <span class="sp"></span><button class="dp" id="dpDown" aria-label="Pasillo de abajo">▼</button><span class="sp"></span>
</div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <div class="sheet-top"><div class="ph" id="sheetPh">🛠️</div>
    <div class="meta"><div class="brandtag signage" id="sheetBrand">TOTAL</div><h2 id="sheetName">Producto</h2><div class="price mono" id="sheetPrice">S/ 0.00</div></div></div>
  <div class="adv-line"><span style="font-size:18px">👷</span><div><span class="who">Asesor:</span> <span id="sheetAdvLine"></span></div></div>
  <p class="desc" id="sheetDesc"></p>
  <div class="specs" id="sheetSpecs"></div>
  <div class="actions"><button class="btn-vid" id="sheetVid">▶ Ver video</button><button class="btn-add" id="sheetAdd">Echar al carrito</button></div>
</div>

<div class="scrim" id="scrimM"></div>
<div class="map-modal" id="mapModal">
  <div class="mm-head"><b>🗺️ Toda la tienda</b><button id="mmClose">✕</button></div>
  <div class="mm-store"><div class="mm-grid" id="mmGrid"></div></div>
  <p class="mm-foot">Toca una sección para ir caminando</p>
</div>

<div class="chat-catch" id="chatCatch"></div>
<div class="chat" id="chat">
  <div class="chat-head"><div class="av">🦺</div><div><b>Asesor TOTAL</b><small>Pregúntame o busca tu herramienta</small></div><button class="x" id="chatX">✕</button></div>
  <div class="chat-msgs" id="advMsgs"></div>
  <div class="chat-chips" id="advChips"></div>
  <div class="chat-input"><input id="advText" placeholder="Ej: taladro, llaves, lo más barato…" autocomplete="off" /><button id="advSend" aria-label="Enviar">➤</button></div>
</div>

<div class="char-select" id="charSelect">
  <div class="cs-card"><div class="cs-logo signage">T</div><h2 class="signage">¡Bienvenido a Total Tools!</h2><p>Elige tu personaje para recorrer la tienda</p>
    <div class="cs-grid" id="csGrid"></div></div>
</div>

<script>
TTDB.applyTheme();
const RACKS = TTDB.racks().slice().sort((a,b)=>a.pasillo-b.pasillo);
const PRODUCTOS = TTDB.productos();
const soles = n => "S/ " + (Number(n)||0).toFixed(2);
const norm = s => String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
const chunk = (a,n)=>{ const r=[]; for(let i=0;i<a.length;i+=n) r.push(a.slice(i,i+n)); return r; };
const CFG = (typeof TTDB.config==="function") ? (TTDB.config()||{}) : {};
const COLS = (CFG.cols>=1 && CFG.cols<=4) ? CFG.cols : Math.min(3, Math.max(1, Math.ceil(Math.sqrt(RACKS.length||1))));

function figHTML(c){ return `<div class="fig" style="--skin:${c.skin||'#e8b98c'};--shirt:${c.shirt};--pants:${c.pants||'#2b3a55'};--hatd:${c.hat?'block':'none'};--hatc:${c.hatc||'#f7b500'}">
  <div class="hat"></div><div class="head"></div><div class="body${c.vest?' vest':''}"></div><div class="arm l"></div><div class="arm r"></div><div class="leg l"></div><div class="leg r"></div></div>`; }
const PRESETS=[{shirt:'#3b82f6',pants:'#1f2a44'},{shirt:'#ef4444',pants:'#3a1f1f'},{shirt:'#22c55e',pants:'#1f3a26',hat:true,hatc:'#f7b500'},{shirt:'#a855f7',pants:'#2e1f3a'},{shirt:'#f7b500',pants:'#3a3320',hat:true,hatc:'#ffffff'},{shirt:'#14b8a6',pants:'#163a36'},{shirt:'#f97316',pants:'#3a2616',hat:true,hatc:'#ffffff'},{shirt:'#cbd5e1',pants:'#2b3a55'}];
document.getElementById("advisorFig").innerHTML = figHTML({shirt:'#f7b500',pants:'#1a1d23',hat:true,hatc:'#f97316',vest:true});

/* ====== Construir corredores (filas) de góndolas ====== */
const world=document.getElementById("world"), grid=document.getElementById("grid");
function guessIcon(n){ const s=norm(n);
  const map=[
    [/(taladro|rotomartillo|atornillad|destornillad|perforad)/,"🪛"],
    [/(amoladora|esmeril|pulidora|disco)/,"⚙️"],
    [/(sierra|serrucho|caladora|tronzad)/,"🪚"],
    [/(llave|dado|ratchet|alicate|pinza|tenaza|crece)/,"🔧"],
    [/(martillo|comba|mazo|cincel)/,"🔨"],
    [/(cinta|metro|wincha|nivel|escuadra|medi|flexom)/,"📏"],
    [/(clavo|tornillo|perno|tuerca|arandela|tarugo|fija)/,"🔩"],
    [/(pintura|brocha|rodillo|esmalte|spray|barniz)/,"🖌️"],
    [/(cable|enchufe|tomacorr|interruptor|electric|extension)/,"🔌"],
    [/(foco|luz|lampar|linterna|led|reflector)/,"💡"],
    [/(manguera|tubo|pvc|gasfiter|cano|grifo|valvula|llave de agua)/,"🚰"],
    [/(guante|casco|lente|mascar|proteccion|arnes|chaleco|seguridad)/,"🦺"],
    [/(candado|cerradura|chapa|bisagra)/,"🔒"],
    [/(pila|bateria|cargador|power)/,"🔋"],
    [/(soldador|soldadura|electrodo)/,"🔥"],
    [/(broca|fresa|punta)/,"🦷"]
  ];
  for(const [re,em] of map){ if(re.test(s)) return em; } return "🛠️"; }
function productCard(p){
  const el=document.createElement("button"); el.className="product"; el.dataset.id=p.id; el.setAttribute("aria-label",p.nombre);
  const ic=(p.emoji&&p.emoji!=="📦")?p.emoji:guessIcon(p.nombre);
  const photo=p.foto?`<img src="${p.foto}" alt="">`:`<span class="ph-ic">${ic}</span>`;
  const vid=p.video?`<span class="vid">▶ video</span>`:"";
  el.innerHTML=`<div class="photo">${photo}${vid}</div><div class="pname">${p.nombre}</div><div class="ptag mono">${soles(p.precio)}</div>`;
  el.addEventListener("click", e=>{ e.stopPropagation(); if(!moved) openSheet(p); }); return el;
}
function buildBay(rack){
  const prods=PRODUCTOS.filter(p=>p.rackId===rack.id);
  const bay=document.createElement("div"); bay.className="bay"; bay.dataset.rack=rack.id; bay.dataset.name=rack.nombre; bay.dataset.pasillo=rack.pasillo;
  bay.innerHTML=`<div class="bay-sign signage">Pasillo ${String(rack.pasillo).padStart(2,"0")} · ${rack.nombre}</div>`;
  const rows=document.createElement("div"); rows.className="bay-rows";
  if(!prods.length){ rows.innerHTML=`<div class="bay-empty">— estante vacío · agrega en Admin —</div>`; }
  else{ const half=Math.ceil(prods.length/2); [prods.slice(0,half), prods.slice(half)].forEach(list=>{ if(!list.length) return;
    const row=document.createElement("div"); row.className="bay-row"; list.forEach(p=>row.appendChild(productCard(p)));
    const ledge=document.createElement("div"); ledge.className="ledge"; rows.appendChild(row); rows.appendChild(ledge); }); }
  bay.appendChild(rows); return bay;
}
function buildStore(){ chunk(RACKS, COLS).forEach(rowRacks=>{ const corr=document.createElement("div"); corr.className="corridor";
  rowRacks.forEach(rack=>corr.appendChild(buildBay(rack))); grid.appendChild(corr); }); }
buildStore();
const corridors=[...grid.querySelectorAll(".corridor")];
const bays=[...grid.querySelectorAll(".bay")];

/* ====== El PERSONAJE camina; góndolas fijas; cambia de corredor con ▲▼ ====== */
const actors=document.getElementById("actors");
const sectionName=document.getElementById("sectionName"), pasilloLabel=document.getElementById("pasilloLabel");
const dpUp=document.getElementById("dpUp"), dpDown=document.getElementById("dpDown"), dpLeft=document.getElementById("dpLeft"), dpRight=document.getElementById("dpRight");
let stageW=0, stageH=0, gridW=0, roadY=0, rowInfo=[], cur=0, charRow=0, moved=false;
let camX=0, camY=0, camYT=0, charX=0, tx=0, raf=null;
const SPEED=8;

function measure(){
  stageW=world.clientWidth; stageH=world.clientHeight; gridW=grid.scrollWidth; roadY=stageH-44;
  const gr=grid.getBoundingClientRect();
  rowInfo = corridors.map(c=>{ const cr=c.getBoundingClientRect();
    const bb=[...c.querySelectorAll(".bay")].map(b=>{ const r=b.getBoundingClientRect(); return { rack:b.dataset.rack, name:b.dataset.name, pasillo:b.dataset.pasillo, x:(r.left-gr.left)+r.width/2 }; });
    return { top:(cr.top-gr.top), minX:bb.length?bb[0].x-26:0, maxX:bb.length?bb[bb.length-1].x+26:0, bays:bb }; });
}
function rowCamY(row){ return Math.max(0, rowInfo[row].top - 18); }
function nearestBayInRow(row,x){ const b=rowInfo[row].bays; let bi=0,bd=1e15; b.forEach((p,i)=>{ const d=Math.abs(p.x-x); if(d<bd){bd=d;bi=i;} }); return bi; }
function followCam(){ const sx=charX-camX;
  if(sx<stageW*0.32) camX=charX-stageW*0.32; else if(sx>stageW*0.68) camX=charX-stageW*0.68;
  camX=Math.max(0,Math.min(Math.max(0,gridW-stageW),camX)); }
function render(){ grid.style.transform=`translate(${-Math.round(camX)}px,${-Math.round(camY)}px)`; actors.style.left=Math.round(charX-camX)+"px"; actors.style.top=Math.round(roadY)+"px"; }
function updateNav(){ const r=rowInfo[charRow]; if(!r) return; cur=nearestBayInRow(charRow,charX); const b=r.bays[cur];
  if(b){ sectionName.textContent=(b.name||"").toUpperCase(); pasilloLabel.textContent="PASILLO "+String(b.pasillo).padStart(2,"0"); }
  dpLeft.classList.toggle("on", cur>0); dpRight.classList.toggle("on", cur<r.bays.length-1);
  dpUp.classList.toggle("on", charRow>0); dpDown.classList.toggle("on", charRow<rowInfo.length-1); }
function loop(){ let busy=false;
  const dx=tx-charX; if(dx<-2) actors.classList.add("face-l"); else if(dx>2) actors.classList.remove("face-l");
  if(Math.abs(dx)>=2){ charX+=Math.sign(dx)*Math.min(SPEED,Math.abs(dx)); busy=true; } else charX=tx;
  const dy=camYT-camY; if(Math.abs(dy)>=2){ camY+=Math.sign(dy)*Math.min(SPEED*2.6,Math.abs(dy)); busy=true; } else camY=camYT;
  followCam(); render(); updateNav();
  if(busy){ actors.classList.add("walking"); raf=requestAnimationFrame(loop); } else { actors.classList.remove("walking"); raf=null; } }
function go(){ if(!raf) raf=requestAnimationFrame(loop); }
function walkTo(x){ const r=rowInfo[charRow]; tx=Math.max(r.minX,Math.min(r.maxX,x)); go(); }
function changeRow(d){ const nr=charRow+d; if(nr<0||nr>=rowInfo.length) return; charRow=nr; camYT=rowCamY(nr);
  const r=rowInfo[nr]; tx=charX=Math.max(r.minX,Math.min(r.maxX,charX)); go();
  const bi=(typeof nearestBayInRow==="function")?nearestBayInRow(nr,charX):0; if(r.bays[bi]) announceBay(r.bays[bi]); }

measure();
if(rowInfo.length){ charRow=0; charX=tx=rowInfo[0].bays[0]?rowInfo[0].bays[0].x:60; camY=camYT=rowCamY(0); followCam(); render(); updateNav(); }
window.addEventListener("resize", ()=>{ measure(); const r=rowInfo[charRow]; if(r){ charX=Math.max(r.minX,Math.min(r.maxX,charX)); camYT=rowCamY(charRow); camY=camYT; followCam(); render(); updateNav(); } });

/* Tap = caminar hacia ahí · deslizar = guiar (sin preventDefault para que el toque al producto abra su ficha) */
let dragging=false, sxp=0;
function pcx(e){ return (e.touches?e.touches[0]:e).clientX; }
function worldX(cx){ const r=world.getBoundingClientRect(); return (cx-r.left)+camX; }
function down(e){ if(e.target.closest(".actors")||e.target.closest(".dpad")) return; dragging=true; moved=false; sxp=pcx(e); }
function move(e){ if(!dragging) return; const x=pcx(e); if(Math.abs(x-sxp)>5) moved=true; if(moved) walkTo(worldX(x)); }
function up(){ if(!dragging) return; dragging=false; if(moved){ tx=charX; } }
world.addEventListener("mousedown", down); window.addEventListener("mousemove", move); window.addEventListener("mouseup", up);
world.addEventListener("touchstart", down, {passive:true}); world.addEventListener("touchmove", move, {passive:true}); world.addEventListener("touchend", up);
world.addEventListener("click", e=>{ if(moved) return; if(e.target.closest(".product")||e.target.closest(".actors")) return; walkTo(worldX(e.clientX)); });
window.addEventListener("keydown", e=>{ const ae=document.activeElement; if(ae && /input|textarea/i.test(ae.tagName)) return;
  if(e.key==="ArrowRight") stepBay(1); else if(e.key==="ArrowLeft") stepBay(-1); else if(e.key==="ArrowUp") changeRow(-1); else if(e.key==="ArrowDown") changeRow(1); });
function stepBay(d){ const r=rowInfo[charRow]; const ni=cur+d; if(ni<0||ni>=r.bays.length) return; walkTo(r.bays[ni].x); announceBay(r.bays[ni]); }
dpLeft.addEventListener("click", ()=>stepBay(-1));
dpRight.addEventListener("click", ()=>stepBay(1));
dpUp.addEventListener("click", ()=>changeRow(-1));
dpDown.addEventListener("click", ()=>changeRow(1));

/* Asesor / mapa: ir caminando a un pasillo o producto */
function locateRack(rackId){ for(let r=0;r<rowInfo.length;r++){ const i=rowInfo[r].bays.findIndex(b=>b.rack===rackId); if(i>=0) return {row:r,idx:i}; } return null; }
function goPasillo(rackId){ closeChat(); const L=locateRack(rackId); if(!L) return; if(L.row!==charRow){ charRow=L.row; camYT=rowCamY(L.row); } const b=rowInfo[L.row].bays[L.idx]; walkTo(b.x); announceBay(b); }
function teleport(id){ const p=PRODUCTOS.find(x=>x.id===id); if(!p) return; closeChat(); const L=locateRack(p.rackId); if(!L) return;
  if(L.row!==charRow){ charRow=L.row; camYT=rowCamY(L.row); }
  const el=world.querySelector('.product[data-id="'+id+'"]'); let X=rowInfo[L.row].bays[L.idx].x;
  if(el){ const gr=grid.getBoundingClientRect(), r=el.getBoundingClientRect(); X=(r.left-gr.left)+r.width/2; }
  walkTo(X); document.querySelectorAll(".product.spot").forEach(x=>x.classList.remove("spot"));
  document.querySelectorAll(".point-pin").forEach(x=>x.remove());
  if(el){ el.classList.add("spot");
    const pin=document.createElement("div"); pin.className="point-pin"; pin.textContent="📍"; el.appendChild(pin);
    const adv=document.getElementById("advisor"); if(adv){ adv.classList.add("point"); setTimeout(()=>adv.classList.remove("point"),3600); }
    setTimeout(()=>{ el.classList.remove("spot"); pin.remove(); },3600);
    advSay("👀 Aquí está: <b>"+escH(p.nombre)+"</b>", 4500); speak("Aquí está, "+p.nombre);
  } }

/* ====== Mapa ====== */
const scrimM=document.getElementById("scrimM"), mapModal=document.getElementById("mapModal"), mmGrid=document.getElementById("mmGrid");
function buildMap(){ mmGrid.style.gridTemplateColumns=`repeat(${COLS},1fr)`; mmGrid.innerHTML="";
  bays.forEach((b)=>{ const n=PRODUCTOS.filter(p=>p.rackId===b.dataset.rack).length;
    const here=(rowInfo[charRow]&&rowInfo[charRow].bays[cur]&&rowInfo[charRow].bays[cur].rack===b.dataset.rack);
    const t=document.createElement("button"); t.className="mm-tile"+(here?" here":"")+(n===0?" empty":"");
    t.innerHTML=`<span class="pn">P${String(b.dataset.pasillo).padStart(2,"0")}</span><b>${b.dataset.name}</b><small>${n} producto${n===1?"":"s"}</small>`;
    t.addEventListener("click", ()=>{ closeMap(); goPasillo(b.dataset.rack); }); mmGrid.appendChild(t); }); }
function openMap(){ buildMap(); scrimM.classList.add("open"); mapModal.classList.add("open"); }
function closeMap(){ scrimM.classList.remove("open"); mapModal.classList.remove("open"); }
document.getElementById("mapBtn").addEventListener("click", openMap);
document.getElementById("mmClose").addEventListener("click", closeMap);
scrimM.addEventListener("click", closeMap);

/* Menú de módulos (db.js) desde el botón de arriba */
document.getElementById("modBtn").addEventListener("click", ()=>{ const m=document.getElementById("ttnav-menu"), o=document.getElementById("ttnav-ov");
  if(!m){ window.location.href="admin.html"; return; } const on=!m.classList.contains("on"); m.classList.toggle("on",on); if(o) o.classList.toggle("on",on); });

/* ====== Hoja producto ====== */
const scrim=document.getElementById("scrim"), sheet=document.getElementById("sheet"); let actual=null;
function openSheet(p){ actual=p;
  document.getElementById("sheetPh").innerHTML=p.foto?`<img src="${p.foto}" alt="">`:`<span class="ph-ic">${(p.emoji&&p.emoji!=="📦")?p.emoji:guessIcon(p.nombre)}</span>`;
  document.getElementById("sheetBrand").textContent=p.marca||"TOTAL"; document.getElementById("sheetName").textContent=p.nombre;
  document.getElementById("sheetPrice").textContent=soles(p.precio); document.getElementById("sheetDesc").textContent=p.desc||"";
  document.getElementById("sheetAdvLine").innerHTML="aquí tienes el <b>"+escH(p.nombre)+"</b>. Estos son sus datos 👇";
  document.getElementById("sheetSpecs").innerHTML=specsHTML(p);
  const _rk=RACKS.find(r=>r.id===p.rackId);
  const _loc=_rk?(" Lo encuentras en el pasillo "+String(_rk.pasillo).padStart(2,"0")+", "+_rk.nombre+"."):"";
  const _pr=p.precio?(" Su precio es "+(soles(p.precio).replace(/S\/\s?/,""))+" soles."):"";
  speak(pick(["Mira, ","Te muestro ","Buena, aquí tienes "])+p.nombre+". "+(p.desc?p.desc+". ":"")+_pr+_loc+" Si te gusta, échalo al carrito.");
  scrim.classList.add("open"); sheet.classList.add("open"); }
function closeSheet(){ scrim.classList.remove("open"); sheet.classList.remove("open"); }
scrim.addEventListener("click", closeSheet);
document.getElementById("sheetVid").addEventListener("click", ()=>{ if(actual&&actual.video) window.open(actual.video,"_blank"); else toast("🎬 Sin video aún (se agrega en Admin)."); });
document.getElementById("sheetAdd").addEventListener("click", ()=>{ if(actual){ const p=actual; Cart.add(p); flyToCart(document.getElementById("sheetPh"), p.emoji||"📦"); closeSheet(); cheer(p); } else closeSheet(); });

/* ====== Asesor / Buscador ====== */
const chat=document.getElementById("chat"), chatCatch=document.getElementById("chatCatch"), advMsgs=document.getElementById("advMsgs");
let advGreeted=false;
function openChat(){ chat.classList.add("open"); chatCatch.classList.add("open");
  if(!advGreeted){ advGreeted=true; botSay("¡Hola! 👷 Soy tu asesor. Escribe lo que buscas (ej. <b>taladro</b>, <b>llaves</b>) o pídeme <b>lo más barato</b> y te llevo al pasillo."); renderChips(); }
  setTimeout(()=>document.getElementById("advText").focus(),250); }
function closeChat(){ chat.classList.remove("open"); chatCatch.classList.remove("open"); }
chatCatch.addEventListener("click", closeChat); document.getElementById("chatX").addEventListener("click", closeChat);
document.getElementById("advTag").addEventListener("click", e=>{ e.stopPropagation(); openChat(); });

/* ====== Asesor: bocadillo, especificaciones y bienvenida ====== */
function escH(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function cap(s){ s=String(s||""); return s.charAt(0).toUpperCase()+s.slice(1); }
function advSay(html,ms){ const b=document.getElementById("advBubble"); if(!b) return;
  b.innerHTML=html; b.classList.add("big","pop"); setTimeout(()=>b.classList.remove("pop"),420);
  if(!ttsOn){ talk(true); clearTimeout(talk._t); talk._t=setTimeout(()=>talk(false), 1600); }
  clearTimeout(advSay._t); if(ms) advSay._t=setTimeout(()=>{ b.classList.remove("big"); b.innerHTML="💬 Pregúntame"; },ms); }
function talk(on){ const a=document.getElementById("advisor"); if(a) a.classList.toggle("talk", !!on); }
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function parseSpecs(name){ const out=[], n=name||""; let m;
  if(m=n.match(/(\d+(?:\.\d+)?)\s?[wW]\b/)) out.push(["Potencia", m[1]+" W"]);
  if(m=n.match(/(\d+(?:\.\d+)?)\s?[vV]\b/)) out.push(["Voltaje", m[1]+" V"]);
  if(m=n.match(/(\d+(?:[.,]\d+)?)\s?(mm|cm|"|m)\b/)) out.push(["Medida", m[1].replace(",",".")+" "+m[2]]);
  if(m=n.match(/(\d+)\s?(pz|pcs|pzs|piezas?|unid)/i)) out.push(["Piezas", m[1]+" pz"]);
  return out; }
function specsHTML(p){ const rack=RACKS.find(r=>r.id===p.rackId), rows=[];
  if(p.marca) rows.push(["Marca", p.marca]);
  rows.push(["Precio", soles(p.precio)]);
  if(rack) rows.push(["Ubicación", "Pasillo "+String(rack.pasillo).padStart(2,"0")+" · "+rack.nombre]);
  parseSpecs(p.nombre).forEach(s=>rows.push(s));
  if(p.nivel) rows.push(["Estante", cap(p.nivel)]);
  let h='<div class="sp-h">Especificaciones</div>';
  rows.forEach(r=> h+='<div class="sp"><span class="k">'+escH(r[0])+'</span><span class="v">'+escH(String(r[1]))+'</span></div>');
  return h; }
/* ---- Voz (TTS) del asesor ---- */
let ttsOn = (localStorage.getItem("tt_voice")!=="0");
let _voices=[];
function loadVoices(){ try{ _voices=window.speechSynthesis.getVoices()||[]; }catch(e){} }
if("speechSynthesis" in window){ loadVoices(); try{ window.speechSynthesis.addEventListener("voiceschanged", loadVoices); }catch(e){} }
function esVoice(){ return _voices.find(v=>/^es[-_]?(pe|419|mx|us)/i.test(v.lang)) || _voices.find(v=>/^es/i.test(v.lang)) || null; }
function speak(t){ if(!ttsOn || !("speechSynthesis" in window) || !t) return;
  try{ const u=new SpeechSynthesisUtterance(String(t)); u.lang="es-ES"; u.rate=1.04; u.pitch=1.02; const v=esVoice(); if(v) u.voice=v;
    u.onstart=()=>talk(true); u.onend=()=>talk(false); u.onerror=()=>talk(false);
    window.speechSynthesis.cancel(); window.speechSynthesis.speak(u); }catch(e){} }
const voiceBtn=document.getElementById("voiceBtn");
function paintVoice(){ if(voiceBtn) voiceBtn.textContent = ttsOn ? "🔊" : "🔇"; }
paintVoice();
if(voiceBtn) voiceBtn.addEventListener("click", ()=>{ ttsOn=!ttsOn; localStorage.setItem("tt_voice", ttsOn?"1":"0"); paintVoice();
  if(ttsOn) speak("Voz activada"); else { try{ window.speechSynthesis.cancel(); }catch(e){} toast("🔇 Voz desactivada"); } });

/* Bienvenida: bocadillo al cargar + voz en el primer toque */
setTimeout(()=>advSay("👷 ¡Bienvenido a <b>TOTAL</b>! Si necesitas algo, pregúntame 😊", 7000), 900);
window.addEventListener("pointerdown", ()=>{ speak("¡Bienvenido a TOTAL! Soy tu asesor. Si necesitas algo, pregúntame."); }, {once:true});

/* ---- Reacciones a lo que hace el cliente ---- */
function cheer(p){ const a=document.getElementById("advisor"); if(a){ a.classList.add("cheer"); setTimeout(()=>a.classList.remove("cheer"),1500); }
  advSay(pick(["🛒 ¡Buena elección!","🛒 ¡Excelente!","🛒 ¡Ese te va a servir!","🛒 ¡Buen ojo!"])+" Lo eché a tu carrito.", 4200);
  speak(pick(["¡Buena elección!","¡Excelente!","¡Buen ojo!","¡Ese se vende un montón!"])+" Agregué "+(p?p.nombre:"el producto")+" a tu carrito."); }

let _lastSec=null;
function announceBay(b){ if(!b||_lastSec===b.rack) return; _lastSec=b.rack;
  const n=PRODUCTOS.filter(x=>x.rackId===b.rack).length;
  advSay("📍 <b>"+escH((b.name||"").toUpperCase())+"</b> · Pasillo "+String(b.pasillo).padStart(2,"0"), 3600);
  speak(pick(["Estás en ","Llegamos a ","Este es el pasillo de "])+(b.name||"")+". Tengo "+n+(n===1?" producto":" productos")+" aquí. Dime qué buscas y te lo señalo."); }

/* ---- Consejos cuando se queda quieto ---- */
let _idleT=null;
function idleTip(){ advSay(pick(["💬 ¿Buscas algo? Pregúntame.","💬 Dime qué necesitas y te llevo.","💬 Tengo de todo, ¿qué herramienta buscas?"]), 4200);
  speak(pick(["¿Buscas algo en especial? Pregúntame y te llevo.","Dime qué necesitas y te muestro dónde está.","¿Te ayudo a encontrar alguna herramienta?"])); resetIdle(); }
function resetIdle(){ clearTimeout(_idleT); _idleT=setTimeout(idleTip, 28000); }
window.addEventListener("pointerdown", resetIdle, true); resetIdle();
function topSearch(){ const v=document.getElementById("topSearch").value.trim(); if(!v) return; openChat(); meSay(v); answer(v); document.getElementById("topSearch").value=""; }
document.getElementById("topSearchBtn").addEventListener("click", topSearch);
document.getElementById("topSearch").addEventListener("keydown", e=>{ if(e.key==="Enter") topSearch(); });
function botSay(html){ const d=document.createElement("div"); d.className="msg bot"; d.innerHTML=html; advMsgs.appendChild(d); advMsgs.scrollTop=advMsgs.scrollHeight; return d; }
function meSay(t){ const d=document.createElement("div"); d.className="msg me"; d.textContent=t; advMsgs.appendChild(d); advMsgs.scrollTop=advMsgs.scrollHeight; }
function renderChips(){ const chips=document.getElementById("advChips"); chips.innerHTML="";
  const add=(t,fn)=>{ const b=document.createElement("button"); b.className="chat-chip"; b.textContent=t; b.addEventListener("click",fn); chips.appendChild(b); };
  RACKS.forEach(r=>add("📍 "+r.nombre, ()=>{ meSay(r.nombre); answer("pasillo:"+r.id); }));
  add("💰 Lo más barato", ()=>{ meSay("Lo más barato"); answer("barato"); }); }
function resultCard(p){ const photo=p.foto?`<img src="${p.foto}">`:((p.emoji&&p.emoji!=="📦")?p.emoji:guessIcon(p.nombre));
  const d=document.createElement("div"); d.className="res";
  d.innerHTML=`<div class="e">${photo}</div><div class="i"><b>${p.nombre}</b><span class="mono">${soles(p.precio)}</span></div><button class="go">Ir 📍</button>`;
  d.querySelector(".go").addEventListener("click", ()=>teleport(p.id)); return d; }
function showResults(intro,list){ botSay(intro);
  if(!list.length){ botSay("No encontré nada 🤔. Prueba: <b>taladro</b>, <b>amoladora</b>, <b>llaves</b>, <b>cinta</b>."); return; }
  const wrap=advMsgs.lastChild; list.slice(0,6).forEach(p=>wrap.appendChild(resultCard(p))); advMsgs.scrollTop=advMsgs.scrollHeight; }
function buscar(q){ const n=norm(q); let r=PRODUCTOS.filter(p=>norm(p.nombre+" "+(p.marca||"")+" "+(p.desc||"")).includes(n));
  if(!r.length){ const toks=n.split(/\s+/).filter(Boolean); r=PRODUCTOS.filter(p=>toks.some(t=>norm(p.nombre+" "+(p.marca||"")+" "+(p.desc||"")).includes(t))); } return r; }
function answer(raw){ const q=String(raw||"").trim(), n=norm(q);
  if(q.startsWith("pasillo:")){ const id=q.slice(8), r=RACKS.find(x=>x.id===id);
    showResults("Te llevo al <b>Pasillo "+String(r.pasillo).padStart(2,"0")+" · "+r.nombre+"</b> 👇", PRODUCTOS.filter(p=>p.rackId===id)); goPasillo(id); return; }
  if(!n) return;
  if(/(hola|buenas|hey|alo|saludos)/.test(n)){ botSay("¡Hola! 👋 ¿Qué herramienta buscas?"); return; }
  if(/(gracias)/.test(n)){ botSay("¡Con gusto! 🙌 ¿Algo más?"); return; }
  if(/(barat|economic|menor precio)/.test(n)){ showResults("Lo más económico ahora 💰:", PRODUCTOS.slice().sort((a,b)=>a.precio-b.precio)); return; }
  const rack=RACKS.find(r=>n.includes(norm(r.nombre))); if(rack && buscar(q).length===0){ answer("pasillo:"+rack.id); return; }
  showResults("Esto encontré 🔧:", buscar(q)); }
document.getElementById("advSend").addEventListener("click", sendAdv);
document.getElementById("advText").addEventListener("keydown", e=>{ if(e.key==="Enter") sendAdv(); });
function sendAdv(){ const i=document.getElementById("advText"), v=i.value.trim(); if(!v) return; meSay(v); i.value=""; answer(v); }

/* ====== Carrito (sostenido por el cliente) ====== */
const Cart=(()=>{ const items=new Map(), btn=document.getElementById("playerCart"), badge=document.getElementById("cartBadge");
  function add(p){ const c=items.get(p.id)||{producto:p,qty:0}; c.qty++; items.set(p.id,c); render(); bump(); beep(); }
  function totalQty(){ let q=0; items.forEach(i=>q+=i.qty); return q; }
  function render(){ const q=totalQty(); badge.textContent=q; badge.classList.toggle("show",q>0); }
  function bump(){ btn.classList.remove("bump"); void btn.offsetWidth; btn.classList.add("bump"); }
  function goCaja(){ if(totalQty()===0){ toast("Tu carrito está vacío 🧰"); return; }
    TTDB.setCart([...items.values()].map(i=>({id:i.producto.id,nombre:i.producto.nombre,emoji:i.producto.emoji||"📦",foto:i.producto.foto||"",precio:i.producto.precio,qty:i.qty})));
    window.location.href="caja.html"; }
  btn.addEventListener("click", e=>{ e.stopPropagation(); goCaja(); }); render(); return { add }; })();

/* ====== Personaje ====== */
const charSelect=document.getElementById("charSelect"), playerFig=document.getElementById("playerFig");
function openCharSelect(){ const g=document.getElementById("csGrid"); g.innerHTML="";
  PRESETS.forEach((c,idx)=>{ const b=document.createElement("button"); b.className="opt"; b.innerHTML=figHTML(c); b.addEventListener("click",()=>pickChar(idx)); g.appendChild(b); });
  charSelect.style.display="grid"; }
function pickChar(idx){ playerFig.innerHTML=figHTML(PRESETS[idx]); try{ localStorage.setItem("tt_char",String(idx)); }catch(e){} charSelect.style.display="none"; }
document.getElementById("charTag").addEventListener("click", e=>{ e.stopPropagation(); openCharSelect(); });
(function initChar(){ let idx=null; try{ const s=localStorage.getItem("tt_char"); if(s!==null) idx=parseInt(s,10); }catch(e){}
  if(idx!==null && PRESETS[idx]){ playerFig.innerHTML=figHTML(PRESETS[idx]); } else openCharSelect();
  setTimeout(()=>{ const b=document.getElementById("advBubble"); if(b) b.style.display="none"; }, 6000); })();

/* ====== Sonido + animación + aviso ====== */
let actx=null;
function beep(){ try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain(); o.type="triangle";
  o.frequency.setValueAtTime(660,actx.currentTime); o.frequency.exponentialRampToValueAtTime(990,actx.currentTime+.08);
  g.gain.setValueAtTime(.12,actx.currentTime); g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+.18);
  o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+.18); }catch(e){} }
function flyToCart(fromEl,emoji){ if(matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const r=fromEl.getBoundingClientRect(), fab=document.getElementById("playerCart").getBoundingClientRect();
  const f=document.createElement("div"); f.className="fly"; f.textContent=emoji; f.style.left=r.left+r.width/2-20+"px"; f.style.top=r.top+r.height/2-20+"px"; document.body.appendChild(f);
  requestAnimationFrame(()=>{ const dx=(fab.left+fab.width/2)-(r.left+r.width/2), dy=(fab.top+fab.height/2)-(r.top+r.height/2); f.style.transform="translate("+dx+"px,"+dy+"px) scale(.25)"; f.style.opacity="0"; });
  setTimeout(()=>f.remove(),600); }
let toastTimer=null;
function toast(text){ let t=document.getElementById("__toast");
  if(!t){ t=document.createElement("div"); t.id="__toast"; t.style.cssText="position:fixed;left:50%;bottom:150px;transform:translateX(-50%);z-index:80;background:#000d;color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;max-width:80vw;text-align:center;box-shadow:0 8px 24px #000a;transition:opacity .25s;opacity:0;"; document.body.appendChild(t); }
  t.textContent=text; t.style.opacity="1"; clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.style.opacity="0",2600); }
</script>
